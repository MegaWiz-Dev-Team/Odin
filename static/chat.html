<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Odin — Asgard Orchestrator</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github-dark-dimmed.min.css">
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11/highlight.min.js"></script>
<style>
  :root {
    --bg: #0b1020; --panel: #131a31; --border: #1f2a4d;
    --fg: #e2e8f0; --muted: #94a3b8; --accent: #60a5fa;
    --user: #1e3a8a; --tool: #1f2937; --tool-result: #064e3b; --error: #7f1d1d;
    --agent-eir: #7c3aed; --agent-uw: #f59e0b;
  }
  * { box-sizing: border-box; }
  body { margin:0; height:100vh; display:flex; flex-direction:column; background:var(--bg); color:var(--fg); font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,sans-serif; }
  header { padding:12px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; background:var(--panel); }
  header h1 { font-size:16px; margin:0; font-weight:600; }
  header .agents { font-size:12px; color:var(--muted); }
  header a { color:var(--muted); text-decoration:none; margin-left:auto; font-size:13px; }
  header a:hover { color:var(--accent); }
  #log { flex:1; overflow-y:auto; padding:16px 20px; display:flex; flex-direction:column; gap:10px; }
  .msg { padding:10px 14px; border-radius:8px; max-width:85%; line-height:1.6; font-size:14px; }
  .msg.user { background:var(--user); align-self:flex-end; white-space:pre-wrap; }
  .msg.assistant { background:var(--panel); border:1px solid var(--border); align-self:flex-start; }
  .msg.error { background:var(--error); align-self:flex-start; font-size:13px; }
  /* Agent dispatch card */
  .msg.agent-dispatch { background:linear-gradient(135deg,#1a1a3e 0%,#1f2937 100%); border-left:3px solid var(--accent); align-self:flex-start; padding:12px 16px; }
  .agent-dispatch .agent-badge { display:inline-flex; align-items:center; gap:6px; padding:3px 10px; border-radius:12px; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; }
  .agent-badge.medical { background:rgba(124,58,237,0.25); color:#c4b5fd; border:1px solid rgba(124,58,237,0.4); }
  .agent-badge.insurance { background:rgba(245,158,11,0.25); color:#fde68a; border:1px solid rgba(245,158,11,0.4); }
  .agent-badge.ocr { background:rgba(96,165,250,0.25); color:#bfdbfe; border:1px solid rgba(96,165,250,0.4); }
  .agent-badge.infra { background:rgba(75,85,99,0.25); color:#d1d5db; border:1px solid rgba(75,85,99,0.4); }
  .agent-dispatch .dispatch-label { font-size:11px; color:var(--muted); margin-bottom:4px; }
  .agent-dispatch .dispatch-msg { font-size:12px; color:#cbd5e1; margin-top:6px; max-height:100px; overflow:auto; white-space:pre-wrap; word-break:break-word; }
  /* Tool result */
  .msg.tool-result { background:var(--tool-result); border-left:3px solid #10b981; align-self:flex-start; font-size:12px; color:#d1fae5; padding:8px 14px; }
  .msg.tool-result details { width:100%; }
  .msg.tool-result summary { cursor:pointer; padding:2px 0; user-select:none; list-style:none; font-weight:600; }
  .msg.tool-result summary::before { content:"▸ "; color:var(--accent); }
  .msg.tool-result details[open] summary::before { content:"▾ "; }
  .msg.tool-result summary::-webkit-details-marker { display:none; }
  .msg.tool-result pre { margin:8px 0 0; max-height:320px; overflow:auto; background:rgba(0,0,0,0.25); padding:8px; border-radius:4px; font-size:11px; }
  /* Markdown rich content */
  .msg.assistant table { width:100%; border-collapse:collapse; margin:10px 0; font-size:13px; }
  .msg.assistant th { background:rgba(96,165,250,0.15); color:var(--accent); padding:8px 12px; text-align:left; border-bottom:2px solid var(--border); font-weight:600; }
  .msg.assistant td { padding:7px 12px; border-bottom:1px solid var(--border); }
  .msg.assistant tr:hover td { background:rgba(255,255,255,0.03); }
  .msg.assistant a { color:var(--accent); text-decoration:underline; text-underline-offset:2px; }
  .msg.assistant a:hover { color:#93c5fd; }
  .msg.assistant code { background:rgba(0,0,0,0.3); padding:2px 6px; border-radius:4px; font-size:12px; font-family:ui-monospace,monospace; }
  .msg.assistant pre { background:rgba(0,0,0,0.35); padding:12px; border-radius:6px; overflow-x:auto; margin:8px 0; }
  .msg.assistant pre code { background:none; padding:0; }
  .msg.assistant blockquote { border-left:3px solid var(--accent); margin:8px 0; padding:4px 12px; color:var(--muted); }
  .msg.assistant ul, .msg.assistant ol { padding-left:20px; margin:6px 0; }
  .msg.assistant h1,.msg.assistant h2,.msg.assistant h3 { margin:12px 0 6px; color:#f1f5f9; }
  .msg.assistant .mermaid { background:rgba(255,255,255,0.03); border-radius:8px; padding:12px; margin:8px 0; }
  .msg.assistant p { margin:4px 0; }
  /* Typing */
  .typing-indicator { display:inline-flex; align-items:center; gap:5px; padding:12px 16px; min-height:38px; max-width:80px; }
  .typing-indicator .dot { width:7px; height:7px; border-radius:50%; background:var(--muted); animation:typing-bounce 1.2s infinite ease-in-out both; }
  .typing-indicator .dot:nth-child(1) { animation-delay:0s; }
  .typing-indicator .dot:nth-child(2) { animation-delay:.18s; }
  .typing-indicator .dot:nth-child(3) { animation-delay:.36s; }
  @keyframes typing-bounce { 0%,70%,100%{transform:translateY(0);opacity:.35} 35%{transform:translateY(-5px);opacity:1} }
  /* File upload area */
  .upload-zone { display:flex; align-items:center; gap:8px; }
  .upload-zone label { cursor:pointer; padding:6px 12px; border:1px dashed var(--border); border-radius:6px; font-size:12px; color:var(--muted); transition:all .2s; }
  .upload-zone label:hover { border-color:var(--accent); color:var(--accent); }
  .upload-zone .file-name { font-size:12px; color:var(--accent); max-width:180px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  form { display:flex; gap:8px; padding:12px 20px; border-top:1px solid var(--border); background:var(--panel); align-items:flex-end; }
  textarea { flex:1; resize:none; padding:10px 12px; border-radius:6px; border:1px solid var(--border); background:#0f1428; color:var(--fg); font:inherit; font-size:14px; min-height:38px; max-height:120px; }
  textarea:focus { outline:none; border-color:var(--accent); }
  button { padding:0 18px; height:38px; border:none; border-radius:6px; background:var(--accent); color:#0b1020; font-weight:600; cursor:pointer; }
  button:disabled { background:var(--muted); cursor:not-allowed; }
  /* A2UI Form Renderer */
  .a2ui-form { background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:16px; margin:10px 0; }
  .a2ui-form h3 { margin:0 0 12px; font-size:14px; color:#f1f5f9; }
  .a2ui-section { margin-bottom:16px; }
  .a2ui-section-title { font-size:12px; font-weight:700; color:var(--accent); text-transform:uppercase; letter-spacing:0.5px; margin:12px 0 8px; }
  .a2ui-field { margin-bottom:12px; }
  .a2ui-field label { display:block; font-size:12px; font-weight:600; margin-bottom:4px; color:#cbd5e1; }
  .a2ui-field .hl7-path { display:block; font-size:10px; color:var(--muted); margin-top:2px; font-style:italic; }
  .a2ui-field input[type="text"],
  .a2ui-field input[type="number"],
  .a2ui-field input[type="date"],
  .a2ui-field select,
  .a2ui-field textarea { width:100%; padding:8px; border:1px solid var(--border); border-radius:4px; background:#0f1428; color:var(--fg); font:inherit; font-size:13px; }
  .a2ui-field input:focus, .a2ui-field select:focus, .a2ui-field textarea:focus { outline:none; border-color:var(--accent); background:#151f3f; }
  .a2ui-field input.error { border-color:#f87171; background:rgba(244,63,94,0.1); }
  .a2ui-field .error-msg { color:#fca5a5; font-size:11px; margin-top:4px; }
  .a2ui-field input[type="checkbox"] { margin-right:6px; }
  .a2ui-submit { display:flex; gap:8px; margin-top:16px; }
  .a2ui-submit button { flex:1; }
  /* PDF Viewer */
  .pdf-container { max-width:400px; max-height:600px; border:1px solid var(--border); border-radius:8px; overflow:hidden; background:#000; margin-bottom:12px; }
  #pdfCanvas { display:block; margin:0 auto; }
  .pdf-controls { display:flex; align-items:center; justify-content:center; gap:8px; padding:8px; background:var(--panel); border-top:1px solid var(--border); font-size:12px; }
  /* Split layout when form is active */
  body.form-active { flex-direction:row; }
  body.form-active #log { flex:1; max-width:60%; border-right:1px solid var(--border); }
  #pdf-panel { display:none; flex:0 0 40%; overflow-y:auto; padding:16px; border-left:1px solid var(--border); }
  body.form-active #pdf-panel { display:flex; flex-direction:column; }
  /* Agent selector + routing status */
  .agent-selector { display:flex; align-items:center; gap:8px; margin-left:auto; }
  .agent-selector select { background:var(--panel); color:var(--fg); border:1px solid var(--border); border-radius:6px; padding:4px 8px; font-size:12px; cursor:pointer; }
  .agent-selector select:focus { outline:none; border-color:var(--accent); }
  .pin-indicator { font-size:11px; padding:3px 8px; border-radius:10px; background:rgba(96,165,250,0.15); color:var(--accent); border:1px solid rgba(96,165,250,0.3); white-space:nowrap; }
  .pin-indicator.pinned { background:rgba(245,158,11,0.15); color:#fde68a; border-color:rgba(245,158,11,0.3); }
  .routing-pill { font-size:10px; padding:2px 8px; border-radius:10px; background:rgba(16,185,129,0.1); color:#6ee7b7; border:1px solid rgba(16,185,129,0.2); white-space:nowrap; }
  .msg.routing { background:rgba(16,185,129,0.05); border:1px solid rgba(16,185,129,0.15); border-left:3px solid #10b981; align-self:flex-start; font-size:11px; color:#6ee7b7; padding:6px 12px; border-radius:6px; max-width:90%; }
</style>
</head>
<body>
<header>
  <h1>🦉 Odin</h1>
  <div class="agents">Infrastructure · Security · Reliability</div>
  <a href="/">← Home</a>
</header>
<div id="log"></div>
<form id="form">
  <textarea id="input" placeholder="Monitor infrastructure, check alerts, investigate security…" autofocus></textarea>
  <button id="send" type="submit">Send</button>
</form>
<script>
mermaid.initialize({ startOnLoad:false, theme:'dark', themeVariables:{ primaryColor:'#1e3a5f', primaryTextColor:'#e2e8f0', lineColor:'#60a5fa' }});
marked.setOptions({ breaks:true, gfm:true, highlight:(code,lang)=>{ try{return lang?hljs.highlight(code,{language:lang}).value:hljs.highlightAuto(code).value}catch{return code} }});

const log=document.getElementById('log'), form=document.getElementById('form'),
      input=document.getElementById('input'), sendBtn=document.getElementById('send');
const history=[];
let typingEl=null;

function scrollBottom(){ log.scrollTop=log.scrollHeight; }

function addMsg(cls,html){
  const d=document.createElement('div'); d.className='msg '+cls; d.innerHTML=html;
  log.appendChild(d); scrollBottom(); return d;
}

function renderMarkdown(text){
  let html=marked.parse(text);
  return html;
}

async function renderMermaidIn(el){
  const blocks=el.querySelectorAll('pre code.language-mermaid, code.language-mermaid');
  for(const b of blocks){
    const container=document.createElement('div'); container.className='mermaid';
    const id='mermaid-'+Math.random().toString(36).slice(2,8);
    try{ const{svg}=await mermaid.render(id,b.textContent); container.innerHTML=svg; }
    catch{ container.textContent=b.textContent; }
    const pre=b.closest('pre')||b; pre.replaceWith(container);
  }
}

function badgeFor(toolName){
  if(['tyr','vardr','huginn','muninn','forseti','mjolnir'].some(s=>toolName.includes(s))) return '<span class="agent-badge infra">⚙️ '+toolName+'</span>';
  return '<span class="agent-badge infra">🔧 '+toolName+'</span>';
}

// ─── PDF Viewer ────────────────────────────────────────────────────────────
let pdfDoc=null, pdfCurrentPage=1;
async function loadPDF(sourceId, tenantId){
  try{
    const resp=await fetch(`/api/files/proxy?source_id=${sourceId}&tenant_id=${tenantId}`,{headers:{'Authorization':'Bearer odin-secret-bearer-token'}});
    if(!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const blob=await resp.blob();
    const url=URL.createObjectURL(blob);
    const pdf=await pdfjsLib.getDocument(url).promise;
    pdfDoc=pdf; pdfCurrentPage=1; showPDFPage(1);
  }catch(e){ console.error('PDF load failed:',e); }
}
async function showPDFPage(num){
  if(!pdfDoc||num<1||num>pdfDoc.numPages) return;
  pdfCurrentPage=num;
  const page=await pdfDoc.getPage(num);
  const viewport=page.getViewport({scale:1.5});
  const canvas=document.createElement('canvas');
  canvas.width=viewport.width; canvas.height=viewport.height;
  const ctx=canvas.getContext('2d');
  await page.render({canvasContext:ctx,viewport}).promise;
  const viewer=document.getElementById('pdfViewer');
  viewer.innerHTML=''; viewer.appendChild(canvas);
  document.getElementById('pdfPageInfo').textContent=`${num} / ${pdfDoc.numPages}`;
  document.getElementById('pdfPrev').disabled=num===1;
  document.getElementById('pdfNext').disabled=num===pdfDoc.numPages;
}
document.getElementById('pdfPrev').addEventListener('click',()=>showPDFPage(pdfCurrentPage-1));
document.getElementById('pdfNext').addEventListener('click',()=>showPDFPage(pdfCurrentPage+1));


function addToolCall(name,args){
  const d=document.createElement('div'); d.className='msg agent-dispatch';
  const msgPreview=args.message?('<div class="dispatch-msg">'+escHtml(String(args.message).slice(0,200))+(String(args.message).length>200?'…':'')+'</div>'):'';
  const argsPreview=Object.keys(args).filter(k=>k!=='message').map(k=>'<code>'+escHtml(k)+'</code>=<code>'+escHtml(String(args[k]).slice(0,60))+'</code>').join(' ');
  d.innerHTML='<div class="dispatch-label">Odin dispatching →</div>'+badgeFor(name)+(argsPreview?' <span style="font-size:11px;color:#94a3b8">'+argsPreview+'</span>':'')+msgPreview;
  log.appendChild(d); scrollBottom();
}

function addToolResult(name,result){
  const d=document.createElement('div'); d.className='msg tool-result';
  const det=document.createElement('details'), sum=document.createElement('summary');
  let preview='';
  if(result&&typeof result==='object'){
    if(result.error) preview=' — ❌ '+String(result.error).slice(0,80);
    else if(result.content) preview=' — ✅ '+String(result.content).slice(0,80)+'…';
    else if(Array.isArray(result)) preview=` — ${result.length} item${result.length===1?'':'s'}`;
    else { const k=Object.keys(result); preview=k.length?' — '+k.slice(0,4).join(', ')+(k.length>4?'…':''):''; }
  }
  sum.innerHTML=badgeFor(name)+' <span style="color:#94a3b8">'+escHtml(preview)+'</span>';
  det.appendChild(sum);
  // If result has content field, render as markdown
  if(result&&result.content&&typeof result.content==='string'){
    const rich=document.createElement('div'); rich.innerHTML=renderMarkdown(result.content);
    rich.style.cssText='margin:8px 0;color:#e2e8f0;font-size:13px;'; det.appendChild(rich);
    setTimeout(()=>renderMermaidIn(rich),50);
  }
  const pre=document.createElement('pre');
  pre.textContent=JSON.stringify(result,null,2); det.appendChild(pre);
  d.appendChild(det); log.appendChild(d); scrollBottom();
}

function showTyping(){ if(typingEl)return; typingEl=document.createElement('div'); typingEl.className='msg assistant typing-indicator'; for(let i=0;i<3;i++){const s=document.createElement('span');s.className='dot';typingEl.appendChild(s);} log.appendChild(typingEl);scrollBottom(); }
function hideTyping(){ if(typingEl){typingEl.remove();typingEl=null;} }
function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }


async function sendChatRequest(){
  const text=input.value.trim();
  if(!text) return;
  addMsg('user',escHtml(text));
  history.push({role:'user',content:text});
  input.value=''; sendBtn.disabled=true; showTyping();

  let assistantBubble=null, assistantText='';
  try{
    const resp=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:history})});
    if(!resp.ok||!resp.body){addMsg('error','HTTP '+resp.status);sendBtn.disabled=false;return;}
    const reader=resp.body.getReader(), dec=new TextDecoder(); let buf='';
    while(true){
      const{value,done}=await reader.read(); if(done)break;
      buf+=dec.decode(value,{stream:true}); let idx;
      while((idx=buf.indexOf('\n\n'))!==-1){
        const block=buf.slice(0,idx); buf=buf.slice(idx+2);
        for(const line of block.split('\n')){
          if(!line.startsWith('data:'))continue;
          const payload=line.slice(5).trim(); if(!payload)continue;
          let evt; try{evt=JSON.parse(payload)}catch{continue}
          if(evt.type==='meta'){
            if(evt.model){ routingPill.textContent='⚡ '+evt.model; routingPill.style.display='inline'; }
          } else if(evt.type==='delta'){
            hideTyping();
            if(!assistantBubble) assistantBubble=addMsg('assistant','');
            assistantText+=evt.content;
            assistantBubble.innerHTML=renderMarkdown(assistantText);
            renderMermaidIn(assistantBubble);
            scrollBottom();
          } else if(evt.type==='tool_call'){
            hideTyping(); addToolCall(evt.name,evt.args||{});
            assistantBubble=null; assistantText='';
          } else if(evt.type==='tool_result'){
            addToolResult(evt.name,evt.result); showTyping();
          } else if(evt.type==='error'){
            hideTyping(); addMsg('error',escHtml(evt.message));
          } else if(evt.type==='done'){
            hideTyping();
            if(assistantText){
              history.push({role:'assistant',content:assistantText});
              // Post-process a2ui forms
              if(assistantBubble) processA2UIForms(assistantBubble);
            } else { addMsg('assistant','<em style="opacity:.6;font-size:12px">(no summary — see tool results above)</em>'); }
          }
        }
      }
    }
  }catch(err){addMsg('error',String(err));}
  finally{hideTyping();sendBtn.disabled=false;input.focus();}
}

input.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();form.requestSubmit();} });

form.addEventListener('submit',async e=>{
  e.preventDefault();
  await sendChatRequest();
});
</script>
</body>
</html>
