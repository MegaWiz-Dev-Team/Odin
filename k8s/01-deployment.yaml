apiVersion: apps/v1
kind: Deployment
metadata:
  name: odin
  namespace: asgard
  labels:
    app: odin
    version: v0.2.0
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: odin
  template:
    metadata:
      labels:
        app: odin
      annotations:
        prometheus.io/scrape: "false"
    spec:
      serviceAccountName: odin
      containers:
      - name: odin
        image: odin:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
          name: http
          protocol: TCP
        env:
        - name: HEIMDALL_URL
          value: "http://host.docker.internal:8080"
        - name: HEIMDALL_MODEL
          # Gemini 3.1 flash-lite via Heimdall's gemini/ provider routing.
          # (claude-sonnet-4-6 routing via the gateway is currently broken —
          # times out/502s.) Supports streaming + tool-calling.
          value: "gemini/gemini-3.1-flash-lite"
        - name: TYR_URL
          value: "https://wazuh-manager.wazuh.svc.cluster.local:55000"
        - name: TYR_USER
          value: "wazuh"
        - name: TYR_PASS
          value: "wazuh"
        - name: TYR_INDEXER_URL
          value: "https://wazuh-indexer.wazuh.svc.cluster.local:9200"
        - name: TYR_INDEXER_USER
          value: "admin"
        - name: TYR_INDEXER_PASS
          value: "admin"
        - name: VARDR_URL
          value: "http://vardr.asgard.svc.cluster.local:9090"
        - name: HUGINN_URL
          value: "http://huginn.asgard.svc.cluster.local:8400"
        - name: MUNINN_URL
          value: "http://muninn.asgard.svc.cluster.local:8500"
        - name: FORSETI_URL
          value: "http://forseti.asgard.svc.cluster.local:5555"
        - name: MJOLNIR_URL
          value: "http://mjolnir.asgard.svc.cluster.local:8700"
        # Mimir — AI-security knowledge base (RAG)
        - name: MIMIR_URL
          value: "http://mimir-api.asgard.svc:8080"
        - name: MIMIR_TENANT
          value: "asgard_platform"
        # NCSA AI Security Guidelines = data source id 3 in asgard_platform
        - name: MIMIR_KB_SOURCE_IDS
          value: "3"
        # Discord bot
        - name: DISCORD_CHANNEL_ID
          value: ""
        - name: DISCORD_TOKEN
          valueFrom:
            secretKeyRef:
              name: odin-secrets
              key: DISCORD_TOKEN
              optional: true
        - name: DISCORD_WEBHOOK_URL
          valueFrom:
            secretKeyRef:
              name: odin-secrets
              key: DISCORD_WEBHOOK_URL
              optional: true
        # API keys
        - name: HEIMDALL_API_KEY
          valueFrom:
            secretKeyRef:
              name: odin-secrets
              key: HEIMDALL_API_KEY
              optional: true
        # Fixed session token (Secret odin-session) so a redeploy doesn't log
        # every dashboard out — without it the token is random per process.
        - name: ODIN_SESSION_TOKEN
          valueFrom:
            secretKeyRef:
              name: odin-session
              key: token
              optional: true
        # Dashboard login password — Secret, never a plaintext literal here.
        - name: ODIN_USER
          value: admin
        - name: ODIN_PASS
          valueFrom:
            secretKeyRef:
              name: odin-secrets
              key: ODIN_PASS
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 2
---
apiVersion: v1
kind: Service
metadata:
  name: odin
  namespace: asgard
  labels:
    app: odin
spec:
  type: ClusterIP
  ports:
  - port: 3000
    targetPort: 3000
    protocol: TCP
    name: http
  selector:
    app: odin
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: odin
  namespace: asgard
